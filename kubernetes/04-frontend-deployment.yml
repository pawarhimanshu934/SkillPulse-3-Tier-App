kind: Deployment
apiVersion: apps/v1

metadata:
  name: frontend-deployment
  namespace: skillpulse-ns
  labels:
    app: frontend

spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels: 
        app: frontend
    spec:
      containers:
        - name: frontend
          image: hiimanshupawar/skillpulse-frontend:c19a3dbcf3473c2421c0239d4ff02ea0adeff9ed
          ports:
            - containerPort: 80
            