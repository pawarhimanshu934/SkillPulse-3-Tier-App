kind: Deployment
apiVersion: apps/v1

metadata:
  name: backend-deployment
  namespace: skillpulse-ns
  labels:
    app: backend
  
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels: 
        app: backend      
    spec:
      containers:
        - name: backend
          image: hiimanshupawar/skillpulse-backend:c19a3dbcf3473c2421c0239d4ff02ea0adeff9ed
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: mysql-config
            - secretRef:
                name: mysql-secret
  
